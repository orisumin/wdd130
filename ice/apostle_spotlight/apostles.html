<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body{
            width: 80%;
            height: 60%;
            text-align: center;   
            margin: 30px auto;     
        }
        #prophets{ 
            margin-left:20% auto;    
            padding-left: 20%;
            padding-right: 20%;
            background-image: url(/ice/apostle_spotlight/images/christus.webp);
            border-radius: 20px;
            border: 8px solid black;
        }
        h1{
            font-family: Arial, Helvetica, sans-serif;
            color: white;
        }
        h2{
            font-family: Arial, Helvetica, sans-serif;
            color: white;
        }
        .counselors{
            width: 150px;
            height: 150px;            
        }
        #president{
            width: 180px;
            height: 180px;
        }
        img{
            border-radius: 50%;
            border: 7px solid white;
            margin: 10px;
        }
        #apostles{
            display: grid;
            grid-template-rows: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
           
        }
        #aposltes img{
            width: 100px;
            height: 100px;
        }

        
    </style>
</head>
<body>
    <div id="prophets">
        <h1>First Presidency</h1>
        <div id="presidency">
            <img src="/ice/apostle_spotlight/images/eyring.webp" class="counselors">
            <img src="/ice/apostle_spotlight/images/oaks.webp" id="president">
            <img src="/ice/apostle_spotlight/images/christofferson.webp" class="counselors">
        </div>
        <h2>Quorum of the Twelve Apostles</h2>
        <div id="aposltes">
            <img src="/ice/apostle_spotlight/images/holland.webp">
            <img src="/ice/apostle_spotlight/images/uchtdorf.webp">
            <img src="/ice/apostle_spotlight/images/bednar.webp">
            <img src="/ice/apostle_spotlight/images/cook.webp">
            <img src="/ice/apostle_spotlight/images/anderson.webp">
            <img src="/ice/apostle_spotlight/images/rasband.webp">
            <img src="/ice/apostle_spotlight/images/stevenson.webp">
            <img src="/ice/apostle_spotlight/images/renlund.webp">
            <img src="/ice/apostle_spotlight/images/gong.webp">
            <img src="/ice/apostle_spotlight/images/soares.webp">
            <img src="/ice/apostle_spotlight/images/kearon.webp">
            <img src="/ice/apostle_spotlight/images/causse.webp">
        </div>
    </div>
</body>
</html>
