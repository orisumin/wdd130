<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
         <table class="paleBlueRows">
          <tr>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th class="year">Year</th>
          </tr>
          <tr>
            <td>Neihlee Muir</td>
            <td>I Will Prepare the Way Before You</td>
            <td>BYUI</td>
            <td class="year">2026</td>
          </tr>
          <tr>
            <td>Matthew S. Holland</td>
            <td>The Path and Power for Your Promised Land</td>
            <td>BYU</td>
            <td class="year">2026</td>
          </tr>
          <tr>
            <td>J. Anette Dennis</td>
            <td>Finding Peace Amidst Uncertainty</td>
            <td>BYU</td>
            <td class="year">2024</td>
          </tr>
         </table>
         
         <div class="form">
          <p>Add Your Favorite Devotional</p>
          <form>
            <label for="Speaker">Speaker:</label>
            <input type="text" id="speaker">
            <label for="Title">Title:</label>
            <input type="text" id="title">
            <label for="Location">Location:</label>
            <input type="text" id="location">
            <label for="Year">Year:</label>
            <input type="text" id="year">
          </form>
         </div>

      </div>
    </main>
  </div>
</body>
</html>
